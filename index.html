<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1326" />
    <title>QuizCard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function () {
        var theme = localStorage.getItem("quizcard-theme");
        if (theme === "light") {
          document.documentElement.dataset.theme = "light";
          document.documentElement.style.colorScheme = "light";
        }
        var palette = localStorage.getItem("quizcard-palette");
        if (palette === "green" || palette === "indigo" || palette === "rose") {
          document.documentElement.dataset.palette = palette;
        }
        if (lang === "ar") {
          document.documentElement.lang = "ar";
          document.documentElement.dir = "rtl";
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
